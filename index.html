<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Management Pro</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    min-height: 100vh;
    color: white;
}

h1 {
    text-align: center;
    margin-top: 20px;
    font-size: 32px;
}

.container {
    max-width: 900px;
    margin: 30px auto;
    padding: 20px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* INPUTS */
input {
    width: 30%;
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: none;
    outline: none;
}

/* BUTTONS */
button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.add-btn { background: #00c853; color: white; }
.add-btn:hover { background: #009624; }

.present { background: #00e676; }
.absent { background: #ff5252; }

.delete { background: #ff1744; color: white; }

.export { background: #2979ff; color: white; margin-top: 10px; }

/* TABLE */
table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
    background: white;
    color: black;
    border-radius: 10px;
    overflow: hidden;
}

th, td {
    padding: 12px;
    text-align: center;
}

th {
    background: #2a5298;
    color: white;
}

/* SEARCH */
.search-box {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    border-radius: 8px;
    border: none;
}

/* STATS */
.stats {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
}

.card {
    flex: 1;
    margin: 5px;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    background: rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<h1>🎓 Attendance Management Pro</h1>

<div class="container">

    <input type="text" id="name" placeholder="Student Name">
    <input type="number" id="roll" placeholder="Roll No">
    <input type="date" id="date">
    <button class="add-btn" onclick="addStudent()">Add</button>

    <input type="text" id="search" class="search-box" placeholder="Search student..." onkeyup="render()">

    <div class="stats">
        <div class="card">Present: <span id="presentCount">0</span></div>
        <div class="card">Absent: <span id="absentCount">0</span></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Roll</th>
                <th>Name</th>
                <th>Date</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="table"></tbody>
    </table>

    <button class="export" onclick="exportCSV()">Export CSV</button>
</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];

function saveData() {
    localStorage.setItem("students", JSON.stringify(students));
}

function addStudent() {
    let name = document.getElementById("name").value;
    let roll = document.getElementById("roll").value;
    let date = document.getElementById("date").value;

    if (!name || !roll || !date) {
        alert("Fill all fields");
        return;
    }

    students.push({ name, roll, date, status: "Absent" });
    saveData();
    render();

    document.getElementById("name").value = "";
    document.getElementById("roll").value = "";
    document.getElementById("date").value = "";
}

function toggle(index) {
    students[index].status =
        students[index].status === "Present" ? "Absent" : "Present";
    saveData();
    render();
}

function deleteStudent(index) {
    students.splice(index, 1);
    saveData();
    render();
}

function render() {
    let table = document.getElementById("table");
    let search = document.getElementById("search").value.toLowerCase();

    table.innerHTML = "";

    let present = 0;
    let absent = 0;

    students.forEach((s, i) => {
        if (!s.name.toLowerCase().includes(search)) return;

        if (s.status === "Present") present++;
        else absent++;

        table.innerHTML += `
        <tr>
            <td>${s.roll}</td>
            <td>${s.name}</td>
            <td>${s.date}</td>
            <td><b>${s.status}</b></td>
            <td>
                <button class="${s.status === 'Present' ? 'absent' : 'present'}"
                    onclick="toggle(${i})">
                    Toggle
                </button>
                <button class="delete" onclick="deleteStudent(${i})">Delete</button>
            </td>
        </tr>`;
    });

    document.getElementById("presentCount").innerText = present;
    document.getElementById("absentCount").innerText = absent;
}

function exportCSV() {
    let csv = "Roll,Name,Date,Status\n";
    students.forEach(s => {
        csv += `${s.roll},${s.name},${s.date},${s.status}\n`;
    });

    let blob = new Blob([csv], { type: "text/csv" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "attendance.csv";
    a.click();
}

render();
</script>

</body>
</html>
